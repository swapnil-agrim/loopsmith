name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]   # the plugin claims python3-stdlib portability — prove it on both
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip pytest pytest-cov
      - name: pytest + coverage (includes the leakage gate + the hook behavioral-spec)
        run: python -m pytest tests/ -q --cov=skills --cov=hooks --cov-report=term-missing --cov-fail-under=85
